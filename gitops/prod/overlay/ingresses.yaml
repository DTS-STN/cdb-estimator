apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cdb-estimator-frontend-public
  labels:
    app.kubernetes.io/name: cdb-estimator-frontend-public
spec:
  ingressClassName: nginx
  tls:
    # TLS secret 'wildcardservicecanadaca' is provisioned by the cluster platform.
    - secretName: wildcardservicecanadaca
      hosts:
        - estimateurpcph-cdbestimator.service.canada.ca
  rules:
    - host: estimateurpcph-cdbestimator.service.canada.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cdb-estimator-frontend
                port:
                  name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cdb-estimator-frontend-internal
  labels:
    app.kubernetes.io/name: cdb-estimator-frontend-internal
spec:
  ingressClassName: nginx
  tls:
    # TLS secret 'proddpinternaldtsstncom' is provisioned by the cluster platform.
    - secretName: proddpinternaldtsstncom
      hosts:
        - cdb-estimator.prod-dp-internal.dts-stn.com
  rules:
    - host: cdb-estimator.prod-dp-internal.dts-stn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cdb-estimator-frontend
                port:
                  name: http
